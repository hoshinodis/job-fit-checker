services:
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_PORT=8080
      - SQLITE_PATH=data/job_fit.db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.1:8b
      - REQUEST_TIMEOUT_SECONDS=120
      - RATE_LIMIT_PER_MINUTE=10
    volumes:
      - app-data:/app/data

volumes:
  app-data:
